<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframe — GDD Móveis Modernos</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f8f8f8;color:#333;}

/* ── WF Toolbar ── */
#wf-bar{position:fixed;top:0;left:0;right:0;z-index:3000;height:42px;background:#0f0f1e;
  border-bottom:2px solid #e8a020;display:flex;align-items:center;gap:5px;padding:0 14px;}
.wf-brand{color:#e8a020;font-size:11px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;margin-right:10px;white-space:nowrap;}
.wf-btn{background:#1e1e38;color:#888;border:1px solid #2d2d50;border-radius:4px;
  padding:4px 10px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.wf-btn:hover{background:#2d2d50;color:#fff;}
.wf-btn.active{background:#e8a020;border-color:#e8a020;color:#fff;font-weight:700;}
#notes-btn{margin-left:auto;background:#1e3828;border-color:#2d5040;color:#4caf50;}
#notes-btn:hover{background:#2d5040;color:#81c784;}

/* ── Site Header ── */
#site-header{position:fixed;top:42px;left:0;right:0;z-index:2000;height:64px;
  background:#fff;border-bottom:1px solid #e8e8e8;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.h-logo{background:#eee;border:2px dashed #ccc;width:120px;height:40px;border-radius:5px;
  display:flex;align-items:center;justify-content:center;font-size:10px;
  color:#999;font-weight:700;cursor:pointer;}
.h-nav{display:flex;gap:2px;}
.h-link{background:none;border:none;color:#555;font-size:13px;padding:7px 13px;
  border-radius:5px;cursor:pointer;font-family:inherit;transition:all .15s;}
.h-link:hover{background:#f5f5f5;color:#333;}
.h-link.active{color:#e8a020;font-weight:600;}
.btn-wpp{background:#25D366;color:#fff;border:none;padding:9px 18px;border-radius:7px;
  font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:7px;transition:background .15s;}
.btn-wpp:hover{background:#1da851;}
.btn-wpp.lg{padding:14px 30px;font-size:14px;}
.btn-wpp.xl{padding:18px 44px;font-size:16px;}
.btn-wpp.full{width:100%;justify-content:center;}

/* ── Layout ── */
#content{padding-top:106px;}
.wrap{max-width:1100px;margin:0 auto;padding:0 40px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
.g21{display:grid;grid-template-columns:1.5fr 1fr;gap:40px;}

/* ── Sections ── */
.sec{padding:64px 0;position:relative;}
.sec-alt{background:#f5f5f5;}
.sec-dark{background:#1a1a2e;color:#fff;}
.sec-green{background:#f0fbf5;}
.sec-tag{display:inline-flex;align-items:center;gap:5px;background:#fff3e0;
  border:1px solid #ffe0b2;color:#e65100;font-size:10px;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;padding:3px 10px;
  border-radius:20px;margin-bottom:14px;}
.sec-h{font-size:28px;font-weight:900;color:#1a1a2e;margin-bottom:10px;line-height:1.2;}
.sec-sub{font-size:15px;color:#666;margin-bottom:30px;max-width:560px;}
.sec-badge{position:absolute;top:14px;right:16px;background:#1e1e38;color:#888;
  font-size:10px;padding:3px 9px;border-radius:4px;font-weight:600;letter-spacing:.5px;}

/* ── WF Placeholders ── */
.wf-img{background:#d8d8d8;border:2px dashed #bbb;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;color:#999;
  font-size:11px;text-align:center;border-radius:8px;}
.wf-img .ic{font-size:32px;opacity:.5;}
.wf-line{background:#e0e0e0;border-radius:3px;margin-bottom:7px;}
.wf-line.p{height:12px;}
.wf-line.full{width:100%;}
.wf-line.l{width:83%;}
.wf-line.m{width:67%;}
.wf-line.s{width:48%;}

/* ── Notes ── */
.wf-note{background:#fffde7;border:1px solid #ffe082;border-left:4px solid #e8a020;
  border-radius:4px;padding:10px 14px;font-size:11px;color:#7a5800;
  margin-top:14px;line-height:1.55;}
.wf-note strong{display:block;margin-bottom:3px;font-size:11px;}

/* ── Hero ── */
.hero{position:relative;min-height:500px;display:flex;align-items:center;background:#c8c8c8;}
.hero-short{min-height:220px;}
.hero-bg{position:absolute;inset:0;background:#c0c0c0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;color:#999;z-index:0;}
.hero-bg .ic{font-size:44px;opacity:.35;}
.hero-bg .lb{font-size:12px;font-weight:600;letter-spacing:.5px;}
.hero-content{position:relative;z-index:1;padding:60px 40px;max-width:1100px;width:100%;margin:0 auto;}
.hero-tag{background:#e8a020;color:#fff;font-size:11px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:4px 12px;
  border-radius:20px;display:inline-block;margin-bottom:18px;}
.hero h1{font-size:40px;font-weight:900;color:#1a1a2e;line-height:1.15;
  margin-bottom:14px;max-width:620px;}
.hero p{font-size:17px;color:#444;margin-bottom:28px;max-width:500px;}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;}

/* ── Outline button ── */
.btn-out{background:#fff;color:#333;border:2px solid #ddd;padding:10px 20px;
  border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;
  transition:all .15s;display:inline-flex;align-items:center;gap:6px;}
.btn-out:hover{border-color:#e8a020;color:#e8a020;}

/* ── Cards ── */
.card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;}
.card-body{padding:18px;}
.dif-card{background:#f9f9f9;border:1px solid #ebebeb;border-radius:10px;
  padding:22px;display:flex;flex-direction:column;gap:10px;}
.icon-circle{width:50px;height:50px;background:#fff3e0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:20px;}

/* ── Nicho cards ── */
.nicho{background:#fff;border:2px solid #e8e8e8;border-radius:10px;overflow:hidden;
  cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;}
.nicho:hover{border-color:#e8a020;box-shadow:0 4px 16px rgba(232,160,32,.2);}
.nicho-lbl{padding:11px;font-size:12px;font-weight:700;text-align:center;color:#333;}

/* ── Steps ── */
.step-row{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;
  padding:36px 0;border-bottom:1px solid #ebebeb;}
.step-row:last-child{border-bottom:none;}
.step-num{width:50px;height:50px;background:#e8a020;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-size:19px;margin-bottom:14px;}
.step-title{font-size:19px;font-weight:800;color:#1a1a2e;margin-bottom:7px;}
.step-desc{font-size:14px;color:#666;line-height:1.7;}

/* ── Stats ── */
.stat{text-align:center;padding:28px 18px;background:#fff;border-radius:10px;border:1px solid #ebebeb;}
.stat-n{font-size:34px;font-weight:900;color:#e8a020;margin-bottom:7px;}
.stat-l{font-size:12px;color:#888;}

/* ── Testimonial ── */
.testi{background:#fff;border:1px solid #ebebeb;border-radius:10px;padding:22px;}
.testi-stars{color:#e8a020;font-size:17px;margin-bottom:10px;}
.testi-author{display:flex;align-items:center;gap:10px;margin-top:14px;}
.testi-avatar{width:42px;height:42px;border-radius:50%;background:#d4d4d4;
  border:2px dashed #bbb;display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;}

/* ── CTA Banner ── */
.cta-band{background:#1a1a2e;color:#fff;padding:68px 40px;text-align:center;position:relative;}
.cta-band h2{font-size:30px;font-weight:900;margin-bottom:10px;}
.cta-band p{font-size:15px;color:#aaa;margin-bottom:28px;}

/* ── Filters ── */
.filter-bar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:28px;}
.chip{background:#f0f0f0;color:#555;border:2px solid #e0e0e0;padding:6px 15px;
  border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  transition:all .15s;font-family:inherit;}
.chip:hover{border-color:#e8a020;color:#e8a020;}
.chip.active{background:#e8a020;border-color:#e8a020;color:#fff;}

/* ── Project / Post cards ── */
.proj-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;
  cursor:pointer;transition:all .2s;}
.proj-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.11);}
.proj-meta{padding:14px;display:flex;flex-direction:column;gap:6px;}
.proj-name{font-size:13px;font-weight:700;color:#1a1a2e;}
.proj-city{font-size:11px;color:#aaa;}
.cat-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;
  border-radius:20px;letter-spacing:.5px;text-transform:uppercase;color:#fff;margin-bottom:3px;}
.post-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;overflow:hidden;
  cursor:pointer;transition:all .2s;}
.post-card:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.1);}
.post-body{padding:16px;}
.post-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  padding:3px 8px;border-radius:4px;display:inline-block;margin-bottom:7px;
  background:#f0f0f0;color:#555;}
.post-title{font-size:13px;font-weight:700;color:#1a1a2e;line-height:1.4;margin-bottom:7px;}
.post-meta{font-size:11px;color:#aaa;}

/* ── Breadcrumb ── */
.breadcrumb{background:#f5f5f5;border-bottom:1px solid #e8e8e8;padding:11px 40px;
  font-size:12px;color:#888;display:flex;align-items:center;gap:7px;}
.back-btn{background:none;border:none;color:#e8a020;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;
  padding:4px 8px;border-radius:4px;transition:background .15s;}
.back-btn:hover{background:#fff3e0;}

/* ── Sidebar ── */
.sidebar{display:flex;flex-direction:column;gap:18px;}
.side-card{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:18px;}
.side-card.wpp{border-color:#25D366;background:#f0fbf5;}
.side-card h4{font-size:14px;font-weight:700;color:#1a1a2e;margin-bottom:7px;}
.side-card p{font-size:12px;color:#888;margin-bottom:14px;}
.mini-post{display:flex;gap:10px;align-items:center;padding:9px 0;
  border-bottom:1px solid #f0f0f0;cursor:pointer;}
.mini-post:last-child{border-bottom:none;}
.mini-post:hover .mpt{color:#e8a020;}
.mpt{font-size:12px;font-weight:600;color:#333;line-height:1.3;}
.mpd{font-size:10px;color:#aaa;margin-top:3px;}

/* ── Contact ── */
.info-block{display:flex;gap:14px;align-items:flex-start;padding:14px;
  background:#f9f9f9;border-radius:8px;border:1px solid #ebebeb;}
.info-icon{width:42px;height:42px;background:#fff3e0;border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.form-f{background:#f9f9f9;border:2px solid #e0e0e0;border-radius:6px;
  padding:11px 15px;font-size:13px;color:#aaa;margin-bottom:10px;
  width:100%;font-family:inherit;}
.form-ta{height:96px;}

/* ── Gallery ── */
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:7px;}

/* ── Article ── */
.art-sec{margin-bottom:28px;}
.art-sec h3{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:10px;}

/* ── Quote ── */
.quote-block{background:#f9f9f9;border-radius:10px;padding:22px;border-left:4px solid #e8a020;margin-top:20px;}

/* ── Footer ── */
.footer{background:#0d0d1a;color:#666;padding:52px 40px 22px;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:36px;margin-bottom:36px;}
.f-logo{background:#1a1a2e;border:2px dashed #2d2d4e;width:110px;height:38px;
  border-radius:4px;display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#444;font-weight:700;margin-bottom:14px;}
.f-col-t{font-size:11px;font-weight:700;color:#888;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:11px;}
.f-link{display:block;font-size:12px;color:#444;margin-bottom:7px;cursor:pointer;transition:color .15s;}
.f-link:hover{color:#e8a020;}
.footer-bot{border-top:1px solid #1a1a2e;padding-top:18px;font-size:11px;
  color:#333;display:flex;justify-content:space-between;}
</style>
</head>
<body>

<!-- ══ WF TOOLBAR ══════════════════════════════════════════════════════ -->
<div id="wf-bar">
  <span class="wf-brand">📐 GDD Wireframe</span>
  <button class="wf-btn active" data-page="home"     onclick="go('home')">Home</button>
  <button class="wf-btn"        data-page="sobre"    onclick="go('sobre')">Sobre</button>
  <button class="wf-btn"        data-page="processo" onclick="go('processo')">Como Funciona</button>
  <button class="wf-btn"        data-page="projetos" onclick="go('projetos')">Projetos</button>
  <button class="wf-btn"        data-page="blog"     onclick="go('blog')">Blog</button>
  <button class="wf-btn"        data-page="contato"  onclick="go('contato')">Contato</button>
  <button class="wf-btn" id="notes-btn" onclick="toggleNotes()">📝 Ocultar Notas</button>
</div>

<!-- ══ SITE HEADER ═════════════════════════════════════════════════════ -->
<header id="site-header">
  <div class="h-logo" onclick="go('home')">LOGO GDD</div>
  <nav class="h-nav">
    <button class="h-link" id="hl-sobre"    onclick="go('sobre')">Sobre</button>
    <button class="h-link" id="hl-processo" onclick="go('processo')">Como Funciona</button>
    <button class="h-link" id="hl-projetos" onclick="go('projetos')">Projetos</button>
    <button class="h-link" id="hl-blog"     onclick="go('blog')">Blog</button>
    <button class="h-link" id="hl-contato"  onclick="go('contato')">Contato</button>
  </nav>
  <button class="btn-wpp" onclick="openWpp()">💬 Falar pelo WhatsApp</button>
</header>

<main id="content"></main>

<script>
// ── Constants ─────────────────────────────────────────────────────────
const WA = 'https://wa.me/5551991666542?text=' +
  encodeURIComponent('Olá! Vim pelo site e gostaria de saber mais sobre os móveis da GDD.');
const openWpp = () => window.open(WA, '_blank');

// ── Data ──────────────────────────────────────────────────────────────
const PROJECTS = [
  { id:1, filter:'roupas',    label:'Lojas de Roupas', color:'#c47a0d', icon:'👗',
    name:'Boutique Fashion Sul',    city:'Porto Alegre/RS',    year:'2025',
    desc:'Projeto completo para loja de moda feminina: araras, expositores de acessórios, provadores e balcão de atendimento em MDF premium com detalhes em metalon.' },
  { id:2, filter:'roupas',    label:'Lojas de Roupas', color:'#c47a0d', icon:'👗',
    name:'Estação Moda Centro',     city:'Novo Hamburgo/RS',   year:'2024',
    desc:'Renovação completa com arara dupla, expositores de vitrine e checkout modernizado. Prazo de entrega: 18 dias corridos.' },
  { id:3, filter:'joalheria', label:'Joalheria',       color:'#7b1fa2', icon:'💍',
    name:'Joalheria Exclusive',     city:'Campo Bom/RS',       year:'2025',
    desc:'Projeto de alto padrão com vitrines iluminadas por LED, expositores de veludo e balcão de vidro temperado. Design sofisticado e seguro.' },
  { id:4, filter:'clinica',   label:'Clínica',         color:'#1565c0', icon:'🏥',
    name:'Clínica Estética Plus',   city:'Caxias do Sul/RS',   year:'2024',
    desc:'Recepção completa com balcão de atendimento, estantes de produtos e mobiliário de sala de espera em MDF lacado branco.' },
  { id:5, filter:'maquiagem', label:'Maquiagem',       color:'#b71c1c', icon:'💄',
    name:'Beauty Store Cosmetics',  city:'São Leopoldo/RS',    year:'2025',
    desc:'Expositores com iluminação integrada, prateleiras de acrílico e gôndolas centrais para e-commerce físico de cosméticos.' },
  { id:6, filter:'otica',     label:'Ótica',           color:'#1b5e20', icon:'👓',
    name:'Ótica Vision Premium',    city:'Campo Bom/RS',       year:'2024',
    desc:'Expositores giratórios em metalon + MDF, vitrines frontais com LED e balcão de atendimento integrado.' },
];

const POSTS = [
  { id:1, filter:'roupas',    label:'Lojas de Roupas', icon:'👗', proj:1,
    date:'Abr 2025', rt:'6 min',
    title:'Do zero à entrega: como transformamos uma boutique em Porto Alegre em 3 semanas' },
  { id:2, filter:'joalheria', label:'Joalheria',       icon:'💍', proj:3,
    date:'Mar 2025', rt:'5 min',
    title:'Joalheria Exclusive: mobiliário de alto padrão com vitrine e expositores sob medida' },
  { id:3, filter:'clinica',   label:'Clínica',         icon:'🏥', proj:4,
    date:'Fev 2025', rt:'4 min',
    title:'Clínica estética com recepção aconchegante: antes e depois completo' },
];

// ── State ─────────────────────────────────────────────────────────────
let activeFilter = 'all';
let notesVisible = true;

// ── Helpers ───────────────────────────────────────────────────────────
const img = (h, icon, label, extra='') =>
  `<div class="wf-img" style="height:${h};${extra}"><span class="ic">${icon}</span><span>${label}</span></div>`;

const lines = (...cls) => cls.map(c => `<div class="wf-line p ${c}"></div>`).join('');

const note = (title, body) =>
  `<div class="wf-note"><strong>📝 ${title}</strong>${body}</div>`;

const badge = (p) =>
  `<span class="cat-badge" style="background:${p.color}">${p.label}</span>`;

const wpp = (lbl, cls='') =>
  `<button class="btn-wpp ${cls}" onclick="openWpp()">💬 ${lbl}</button>`;

const secTag   = t => `<div class="sec-tag">📐 ${t}</div>`;
const secBadge = t => `<div class="sec-badge">${t}</div>`;

// ── Navigation ────────────────────────────────────────────────────────
function go(page, params={}) {
  // Update toolbar
  const mainKey = {projeto:'projetos', post:'blog'}[page] || page;
  document.querySelectorAll('#wf-bar .wf-btn:not(#notes-btn)').forEach(b => {
    b.classList.toggle('active', b.dataset.page === mainKey);
  });

  // Update header nav
  document.querySelectorAll('.h-link').forEach(b => b.classList.remove('active'));
  const hl = document.getElementById('hl-' + mainKey);
  if (hl) hl.classList.add('active');

  // Set filter
  if (page === 'projetos') activeFilter = params.filter !== undefined ? params.filter : 'all';

  // Render
  const renders = { home:renderHome, sobre:renderSobre, processo:renderProcesso,
    projetos:renderProjetos, projeto:()=>renderProjeto(params.id),
    blog:renderBlog, post:()=>renderPost(params.id), contato:renderContato };
  document.getElementById('content').innerHTML = (renders[page] || renderHome)();
  window.scrollTo({top:0,behavior:'instant'});
  if (!notesVisible) applyNoteVis();
}

function toggleNotes() {
  notesVisible = !notesVisible;
  document.getElementById('notes-btn').textContent = (notesVisible ? '📝 Ocultar' : '📝 Mostrar') + ' Notas';
  applyNoteVis();
}
function applyNoteVis() {
  document.querySelectorAll('.wf-note').forEach(el => { el.style.display = notesVisible ? '' : 'none'; });
}

// ── Shared components ─────────────────────────────────────────────────
const projCard = p => `
<div class="proj-card" onclick="go('projeto',{id:${p.id}})">
  ${img('200px', p.icon, 'Foto do projeto — ' + p.name)}
  <div class="proj-meta">${badge(p)}<div class="proj-name">${p.name}</div><div class="proj-city">📍 ${p.city} · ${p.year}</div></div>
</div>`;

const postCard = p => `
<div class="post-card" onclick="go('post',{id:${p.id}})">
  ${img('170px', p.icon, 'Foto de capa do projeto')}
  <div class="post-body">
    <span class="post-tag">${p.label}</span>
    <div class="post-title">${p.title}</div>
    <div class="post-meta">📅 ${p.date} · ⏱️ ${p.rt} de leitura</div>
  </div>
</div>`;

const footer = () => `
<footer class="footer">
  <div class="footer-grid">
    <div>
      <div class="f-logo">LOGO GDD</div>
      <p style="font-size:12px;color:#444;line-height:1.7">Projeto, fabricação e montagem de<br>móveis comerciais sob medida.<br>Campo Bom/RS</p>
    </div>
    <div>
      <div class="f-col-t">Navegação</div>
      ${['sobre','processo','projetos','blog','contato'].map((p,i)=>
        `<span class="f-link" onclick="go('${p}')">${['Sobre a Empresa','Como Funciona','Projetos','Blog','Contato'][i]}</span>`
      ).join('')}
    </div>
    <div>
